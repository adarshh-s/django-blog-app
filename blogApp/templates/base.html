<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Inkwell{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="{% url 'blog_list' %}" class="site-logo">Inkwell</a>
        <nav class="site-nav">
          <a href="{% url 'blog_list' %}" class="nav-link">All Posts</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      {% if messages %}
      <div class="messages-container">
        {% for message in messages %}
        <div class="message message--{{ message.tags }}">
          <span>{{ message }}</span>
          <button class="message-close" onclick="this.parentElement.remove()">
            ×
          </button>
        </div>
        {% endfor %}
      </div>
      {% endif %} {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <span class="footer-brand">Inkwell</span>
        <span class="footer-note">Your personal writing space</span>
      </div>
    </footer>

    {% block extra_js %}{% endblock %}
  </body>
</html>
